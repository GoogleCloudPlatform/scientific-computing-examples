project_id: "openfoam-jrt"
region: "us-central1"

job_prefix: 'container-'
machine_type: "n2-standard-2"
container: 
  image_uri: "us-east1-docker.pkg.dev/openfoam-jrt/auto-created-repository/otb"
  entry_point: "/bin/bash"
  commands: ["-c", "source /root/OTB_install/otbenv.profile"]

task_count: 4 #optional
parallelism: 4 #optional
task_count_per_node: 2 #optional
install_gpu_drivers: true

labels: 
  env: "pybatch"
  type: "hello"
