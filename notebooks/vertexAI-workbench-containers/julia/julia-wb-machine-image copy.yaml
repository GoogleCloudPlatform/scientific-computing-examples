---

blueprint_name: julia-workbench

vars:
  project_id:  ## Set GCP Project ID Here ##
  deployment_name: julia-wb-v1
  region: us-east1


validators: # skipping validators because enablement of services is done as part of blueprint
- validator: test_project_exists
  skip: true
- validator: test_apis_enabled
  skip: true


# Documentation for each of the modules used below can be found at
# https://github.com/GoogleCloudPlatform/hpc-toolkit/blob/main/modules/README.md

deployment_groups:
- group: enable_apis
  modules:

  - id: enable_apis
    source: community/modules/project/service-enablement
    settings:
      gcp_service_list: [
        "cloudbuild.googleapis.com",
        "cloudresourcemanager.googleapis.com",
        "stackdriver.googleapis.com",
        "logging.googleapis.com",
        "notebooks.googleapis.com",
        "artifactregistry.googleapis.com",
        "compute.googleapis.com"
      ]  
- group: scripts
  modules:
  - id: packer_script
    # configure conda environment for llama
    source: modules/scripts/startup-script
    settings:
      runners:
      - type: shell
        destination: install-julia.sh
        content: |
          #!/bin/bash
          mkdir /opt/julia && \
            cd /opt/julia && \
            wget https://julialang-s3.julialang.org/bin/linux/x64/1.9/julia-1.9.4-linux-x86_64.tar.gz && \
            tar zxvf julia-1.9.4-linux-x86_64.tar.gz && \
            ln -s /opt/julia/julia-1.9.4/bin/julia /usr/local/bin/julia
          export JULIA_CPU_TARGET="generic;sandybridge,-xsaveopt,clone_all;haswell,-rdrnd,base(1)" 
          julia -e 'import Pkg; Pkg.update()'  && \
            julia -e 'using Pkg; Pkg.add(["IJulia", "Lux", "ModelingToolkit", "Optimization", "OptimizationOptimisers", "NeuralPDE", "Plots"])' &&\
            julia -e 'using Pkg; Pkg.precompile'

- group: packer
  modules:
  - id: custom-image
    source: modules/packer/custom-image
    kind: packer
    use:
    - packer_script
    settings:
      source_image_project_id: [schedmd-slurm-public]
      source_image_family: slurm-gcp-6-1-hpc-centos-7
      disk_size: $(vars.disk_size_gb)
      image_family: $(vars.new_image_family)
      machine_type: c2-standard-8 # building this image does not require a GPU-enabled VM
      state_timeout: 30m


  
- group: notebook
  modules:

  - id: vertex_ai_workbench
    source: ./workbench
    settings:
      image_family: workbench-images-jrt
      image_project: var.project