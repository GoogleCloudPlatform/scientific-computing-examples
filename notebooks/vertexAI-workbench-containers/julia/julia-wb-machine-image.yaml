---

blueprint_name: julia-workbench

vars:
  project_id:  ## Set GCP Project ID Here ##
  deployment_name: julia-wb-v3
  region: us-east1


validators: # skipping validators because enablement of services is done as part of blueprint
- validator: test_project_exists
  skip: true
- validator: test_apis_enabled
  skip: true


# Documentation for each of the modules used below can be found at
# https://github.com/GoogleCloudPlatform/hpc-toolkit/blob/main/modules/README.md

deployment_groups:
- group: enable_apis
  modules:

  - id: enable_apis
    source: community/modules/project/service-enablement
    settings:
      gcp_service_list: [
        "cloudbuild.googleapis.com",
        "cloudresourcemanager.googleapis.com",
        "stackdriver.googleapis.com",
        "logging.googleapis.com",
        "notebooks.googleapis.com",
        "artifactregistry.googleapis.com",
        "compute.googleapis.com"
      ]  
- group: notebook
  modules:

  - id: vertex_ai_workbench
    source: ./workbench-machine-image
    settings:
      image_family: workbench-images-jrt
      image_project: $(vars.project_id)